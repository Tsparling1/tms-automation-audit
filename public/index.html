<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time & Automation Discovery Audit — TMS Solutions Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #FAFAF7;
      --bg-card: #FFFFFF;
      --gold: #B8860B;
      --gold-muted: #9A7209;
      --gold-dim: rgba(184,134,11,0.08);
      --gold-border: rgba(184,134,11,0.22);
      --ink: #1C1C1E;
      --gray: #6B7280;
      --gray-light: #4B5563;
      --border: #E8E5DC;
      --radius: 14px;
      --radius-sm: 8px;
      --green: #15803D;
      --green-dim: rgba(21,128,61,0.08);
      --green-border: rgba(21,128,61,0.28);
      --yellow: #B45309;
      --yellow-dim: rgba(180,83,9,0.08);
      --yellow-border: rgba(180,83,9,0.28);
      --red: #B91C1C;
      --red-dim: rgba(185,28,28,0.07);
      --red-border: rgba(185,28,28,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app { min-height: 100vh; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ==================== LANDING ==================== */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
      text-align: center;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .landing::before {
      content: '';
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(184,134,11,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .landing-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    .tms-letters {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 7px;
      line-height: 1;
    }
    .tms-sub {
      display: block;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 4px;
    }

    .landing-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .landing-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      font-weight: 700;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      padding: 5px 14px;
      border-radius: 20px;
    }
    .landing-title {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: clamp(32px, 5.5vw, 54px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -1px;
      color: var(--ink);
      margin-bottom: 18px;
    }
    .landing-title .gold { color: var(--gold); display: block; }
    .landing-divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, rgba(184,134,11,0.3), var(--gold), rgba(184,134,11,0.3));
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .landing-sub {
      font-size: 16px;
      color: var(--gray-light);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .landing-meta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 18px;
      margin-bottom: 36px;
      font-size: 13px;
      color: var(--gray);
    }
    .landing-meta-row span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .landing-meta-row span::before {
      content: '✓';
      color: var(--gold);
      font-weight: 700;
    }

    .landing-form-card {
      background: #FFFFFF;
      border: 1px solid rgba(184,134,11,0.18);
      border-radius: 16px;
      padding: 28px 32px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .landing-biz-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 20px;
      width: 100%;
    }
    .landing-biz-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      font-weight: 600;
    }
    .landing-biz-hint {
      font-size: 11px;
      color: #9CA3AF;
    }
    .landing-biz-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--ink);
      font-size: 15px;
      font-family: 'Inter', inherit;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .landing-biz-input::placeholder { color: #B0ADA4; }
    .landing-biz-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
      background: #FFFFFF;
    }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #FFFFFF;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(184,134,11,0.35);
      font-family: 'Inter', inherit;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(184,134,11,0.5);
      background: var(--gold-muted);
    }
    .landing-footnote {
      margin-top: 12px;
      font-size: 12px;
      color: var(--gray);
      text-align: center;
    }

    /* ==================== PROGRESS BAR ==================== */
    .progress-wrap {
      background: #FFFFFF;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 760px;
      margin: 0 auto 10px;
      font-size: 12px;
      color: var(--gray);
    }
    .progress-head strong { color: var(--gold); font-size: 13px; font-weight: 700; }
    .progress-steps {
      display: flex;
      gap: 4px;
      max-width: 760px;
      margin: 0 auto;
    }
    .ps {
      flex: 1;
      height: 4px;
      background: #EDE9DE;
      border-radius: 2px;
      transition: background 0.3s ease;
    }
    .ps.done  { background: rgba(184,134,11,0.45); }
    .ps.active { background: var(--gold); }

    /* ==================== SECTION PAGE ==================== */
    .section-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .section-body {
      flex: 1;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 44px 24px 60px;
      animation: fadeUp 0.3s ease both;
    }
    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 900;
      letter-spacing: -0.3px;
      line-height: 1.15;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .section-desc {
      font-size: 15px;
      color: var(--gray-light);
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 540px;
    }

    /* ==================== QUESTION CARDS ==================== */
    .questions { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }

    .question {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .q-num {
      font-size: 10px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .q-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    /* Option cards */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .option-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: all 0.17s ease;
      user-select: none;
    }
    .option-card:hover {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .option-card.selected {
      border-color: var(--gold);
      background: rgba(184,134,11,0.07);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
    }
    .option-letter {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #EDE9DE;
      color: var(--gray);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.17s ease;
      margin-top: 1px;
    }
    .option-card.selected .option-letter {
      background: var(--gold);
      color: #FFFFFF;
    }
    .option-card:hover:not(.selected) .option-letter {
      background: rgba(184,134,11,0.2);
      color: var(--gold);
    }
    .option-text {
      font-size: 14px;
      color: var(--gray-light);
      line-height: 1.5;
      transition: color 0.17s;
    }
    .option-card.selected .option-text { color: var(--ink); font-weight: 500; }

    /* Nav */
    .section-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 8px;
    }
    .btn-back {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--gray);
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', inherit;
    }
    .btn-back:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .btn-next {
      background: var(--gold);
      border: none;
      color: #FFFFFF;
      padding: 14px 40px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(184,134,11,0.35);
      letter-spacing: 0.2px;
      font-family: 'Inter', inherit;
    }
    .btn-next:hover {
      background: var(--gold-muted);
      box-shadow: 0 6px 28px rgba(184,134,11,0.5);
      transform: translateY(-1px);
    }
    .btn-next:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .nav-hint {
      font-size: 12px;
      color: #B0ADA4;
      margin-left: auto;
    }

    /* ==================== RESULTS PAGE ==================== */
    .results-page {
      min-height: 100vh;
      background: var(--bg);
      padding: 0 0 100px;
      animation: fadeUp 0.4s ease both;
      color: var(--ink);
    }
    .results-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    .results-header {
      text-align: center;
      padding: 56px 24px 0;
      margin-bottom: 0;
    }
    .res-header-logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .res-tms {
      font-size: 22px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 8px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .res-sub {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #9CA3AF;
    }
    .res-header-divider {
      width: 64px;
      height: 2px;
      background: linear-gradient(to right, rgba(184,134,11,0.3), var(--gold), rgba(184,134,11,0.3));
      margin: 0 auto 24px;
      border-radius: 2px;
    }
    .res-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 900;
      letter-spacing: -0.3px;
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .res-biz {
      font-size: 16px;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .res-date {
      font-size: 12px;
      color: #9CA3AF;
      letter-spacing: 0.5px;
      margin-bottom: 44px;
    }

    /* Score Ring */
    .overall-score-wrap {
      text-align: center;
      padding: 48px 24px 52px;
      background: #FFFFFF;
      border-radius: 20px;
      border: 1px solid rgba(184,134,11,0.15);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .score-ring-container {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }
    .score-ring {
      width: 192px;
      height: 192px;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 28px rgba(0,0,0,0.10);
    }
    .score-ring::after {
      content: '';
      position: absolute;
      inset: 20px;
      background: #fff;
      border-radius: 50%;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
    }
    .score-ring-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1;
    }
    .score-pct {
      font-size: 52px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
      display: block;
    }
    .score-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      display: block;
    }
    .score-pct.green, .score-label.green { color: #15803D; }
    .score-pct.yellow, .score-label.yellow { color: #B45309; }
    .score-pct.red, .score-label.red { color: #B91C1C; }

    .score-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .score-status-badge.green  { background: #F0FDF4; color: #15803D; border: 1.5px solid #86EFAC; }
    .score-status-badge.yellow { background: #FFFBEB; color: #B45309; border: 1.5px solid #FCD34D; }
    .score-status-badge.red    { background: #FEF2F2; color: #B91C1C; border: 1.5px solid #FCA5A5; }

    .score-verdict {
      font-size: 15px;
      color: var(--gray-light);
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* Hours Lost Highlight */
    .hours-lost-wrap {
      margin: 12px 0;
      background: #FFFDF5;
      border: 1.5px solid rgba(184,134,11,0.25);
      border-radius: 16px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: 0 2px 12px rgba(184,134,11,0.08);
    }
    .hours-icon {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FEF9E7 0%, #FDE68A 100%);
      border: 1px solid rgba(184,134,11,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    .hours-content {}
    .hours-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .hours-value {
      font-size: 28px;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 4px;
    }
    .hours-desc {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.5;
    }

    /* Section Divider */
    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(184,134,11,0.25), transparent);
      margin: 44px 0 32px;
    }

    .sections-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* Category Cards */
    .sections-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 44px;
    }
    .sec-card {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid rgba(184,134,11,0.15);
      box-shadow: 0 2px 14px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .sec-card-hdr {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #F3F0E8;
      background: #FFFDF5;
    }
    .sec-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #FEF9E7 0%, #FDE68A 100%);
      border: 1px solid rgba(184,134,11,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .sec-info { flex: 1; }
    .sec-num {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-bottom: 2px;
    }
    .sec-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--ink);
    }
    .sec-score-area { text-align: right; }
    .sec-score-pct {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }
    .sec-score-badge {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 3px;
    }
    .green-text  { color: #15803D; }
    .yellow-text { color: #B45309; }
    .red-text    { color: #B91C1C; }

    .sec-card-body { padding: 8px 0; }
    .sec-progress-bar-wrap {
      padding: 10px 24px 14px;
      border-bottom: 1px solid #F7F5F0;
    }
    .sec-progress-track {
      height: 6px;
      background: #EDE9DE;
      border-radius: 3px;
      overflow: hidden;
    }
    .sec-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .sec-progress-fill.green  { background: #15803D; }
    .sec-progress-fill.yellow { background: #B45309; }
    .sec-progress-fill.red    { background: #B91C1C; }

    .sec-status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
    }
    .sec-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .sec-status-pill.green  { background: #F0FDF4; color: #15803D; border: 1px solid #86EFAC; }
    .sec-status-pill.yellow { background: #FFFBEB; color: #B45309; border: 1px solid #FCD34D; }
    .sec-status-pill.red    { background: #FEF2F2; color: #B91C1C; border: 1px solid #FCA5A5; }
    .sec-status-desc {
      font-size: 12px;
      color: var(--gray);
      line-height: 1.4;
    }

    /* Top 3 Opportunities */
    .opps-wrap {
      background: #FFFFFF;
      border-radius: 20px;
      border: 1px solid rgba(184,134,11,0.15);
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .opps-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid #F3F0E8;
      background: #FFFDF5;
    }
    .opps-eyebrow {

function getColor(pct) {
  if (pct <= 40) return 'red';
  if (pct <= 70) return 'yellow';
  return 'green';
}

function getColorLabel(color) {
  if (color === 'green')  return 'Strong Foundation';
  if (color === 'yellow') return 'Room to Grow';
  return 'High Opportunity';
}

function getRingGradient(pct, color) {
  const colorMap = { red: '#B91C1C', yellow: '#B45309', green: '#15803D' };
  const c = colorMap[color];
  const deg = Math.round(pct / 100 * 360);
  return `conic-gradient(${c} 0deg ${deg}deg, #EDE9DE ${deg}deg 360deg)`;
}

function getVerdictText(color, pct) {

  return `You've built a solid operational foundation with good systems in place. The opportunity now is optimization — tightening integrations, improving consistency, and finding the remaining manual steps that can be removed to give you more leverage as you grow.`;
}

  let total = 0;
  cat.questions.forEach((q, qi) => {
    const key = `${catId}-${qi}`;
    total += (answers[key] ?? 0);
  });
  const max = cat.questions.length * 3;
  return { score: total, max, pct: Math.round((total / max) * 100) };
}

function countAnsweredInCategory(catIdx) {
  const cat = CATEGORIES[catIdx];
  return cat.questions.filter((q, qi) => answers[`${cat.id}-${qi}`] !== undefined).length;
}

function allCategoryAnswered(catIdx) {
  return countAnsweredInCategory(catIdx) === CATEGORIES[catIdx].questions.length;
}

function startQuiz() {

  answers = {};

function renderQuiz() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="section-page" id="quiz-page">
      <div class="progress-wrap" id="progress-bar"></div>
      <div class="section-body" id="section-body"></div>
    </div>
  `;
  renderProgress();
  renderCategoryQuestions();
  window.scrollTo(0, 0);
}

function renderProgress() {
  const bar = document.getElementById('progress-bar');
  if (!bar) return;
  const stepsHtml = CATEGORIES.map((cat, i) => {
    let cls = '';
    if (i < currentCat) cls = 'done';
    else if (i === currentCat) cls = 'active';
    return `<div class="ps ${cls}" title="${cat.name}"></div>`;
  }).join('');

  bar.innerHTML = `
    <div class="progress-head">
      <span>Category <strong>${currentCat + 1} of ${CATEGORIES.length}</strong> — ${CATEGORIES[currentCat].name}</span>
      <span>${Object.keys(answers).length} of 25 answered</span>
    </div>
    <div class="progress-steps">${stepsHtml}</div>
  `;
}

function renderCategoryQuestions() {
  const body = document.getElementById('section-body');
  if (!body) return;
  const cat = CATEGORIES[currentCat];

  // Calculate global question number offset
  let qOffset = 0;
  for (let i = 0; i < currentCat; i++) {
    qOffset += CATEGORIES[i].questions.length;
  }

  const questionsHtml = cat.questions.map((q, qi) => {
    const key = `${cat.id}-${qi}`;
    const globalNum = qOffset + qi + 1;
    const optionsHtml = q.options.map((opt, oi) => {
      const letters = ['A', 'B', 'C', 'D'];
      const isSelected = answers[key] === opt.value;
      return `
        <div
          class="option-card ${isSelected ? 'selected' : ''}"
          onclick="selectOption('${key}', ${opt.value})"
          role="radio"
          aria-checked="${isSelected}"
          tabindex="0"
          onkeydown="if(event.key==='Enter'||event.key===' ')selectOption('${key}', ${opt.value})"
        >
          <div class="option-letter">${letters[oi]}</div>
          <div class="option-text">${escHtml(opt.label)}</div>
        </div>
      `;
    }).join('');

    return `
      <div class="question" id="q-${key}">
        <div class="q-num">Question ${globalNum}</div>
        <div class="q-text">${escHtml(q.text)}</div>
        <div class="options-list">${optionsHtml}</div>
      </div>
    `;
  }).join('');

  const isFirst = currentCat === 0;
  const isLast  = currentCat === CATEGORIES.length - 1;
  const allAnswered = allCategoryAnswered(currentCat);

  body.innerHTML = `
    <div class="section-badge">${cat.icon} &nbsp;${cat.name}</div>
    <h2 class="section-title">${cat.name}</h2>
    <p class="section-desc">${cat.desc}</p>

    <div class="questions">
      ${questionsHtml}
    </div>

    <div class="section-nav">
      ${!isFirst ? `<button class="btn-back" onclick="prevCategory()">← Back</button>` : ''}
      <button
        class="btn-next"
        id="btn-next"
        onclick="${isLast ? 'showResults()' : 'nextCategory()'}"
        ${allAnswered ? '' : 'disabled'}
      >
        ${isLast ? 'See My Results →' : 'Next Category →'}
      </button>
      ${!allAnswered ? `<span class="nav-hint">Answer all ${cat.questions.length} questions to continue</span>` : ''}
    </div>
  `;
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function selectOption(key, value) {
  answers[key] = value;

  // Re-render just this question's options (fast update)
  const [catId, qiStr] = key.split('-');
  const catIdx = CATEGORIES.findIndex(c => c.id === catId);
  const qi = parseInt(qiStr);
  const q = CATEGORIES[catIdx].questions[qi];

  const qEl = document.getElementById(`q-${key}`);
  if (qEl) {
    const letters = ['A', 'B', 'C', 'D'];
    const optionsList = qEl.querySelector('.options-list');
    if (optionsList) {
      optionsList.innerHTML = q.options.map((opt, oi) => {
        const isSelected = opt.value === value;
        return `
          <div
            class="option-card ${isSelected ? 'selected' : ''}"
            onclick="selectOption('${key}', ${opt.value})"
            role="radio"
            aria-checked="${isSelected}"
            tabindex="0"
            onkeydown="if(event.key==='Enter'||event.key===' ')selectOption('${key}', ${opt.value})"
          >
            <div class="option-letter">${letters[oi]}</div>
            <div class="option-text">${escHtml(opt.label)}</div>
          </div>
        `;
      }).join('');
    }
  }

  // Update Next button state
  const allAnswered = allCategoryAnswered(currentCat);
  const btnNext = document.getElementById('btn-next');
  if (btnNext) {
    btnNext.disabled = !allAnswered;
  }

  // Update hint text
  const nav = document.querySelector('.section-nav');
  if (nav) {
    const existingHint = nav.querySelector('.nav-hint');
    if (allAnswered && existingHint) {
      existingHint.remove();
    } else if (!allAnswered && !existingHint) {
      const hint = document.createElement('span');
      hint.className = 'nav-hint';
      hint.textContent = `Answer all ${CATEGORIES[currentCat].questions.length} questions to continue`;
      nav.appendChild(hint);
    }
  }

  // Update progress count
  renderProgress();
}

function nextCategory() {
  if (!allCategoryAnswered(currentCat)) return;
  currentCat++;
  renderProgress();
  renderCategoryQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevCategory() {
  if (currentCat > 0) {
    currentCat--;
    renderProgress();
    renderCategoryQuestions();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function downloadPDF() {
  if (!lastResults || !window.jspdf) return;

  // Button loading state
  const btn = document.getElementById('btn-pdf');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }

  // Small timeout lets the browser repaint before blocking on PDF build
  setTimeout(() => {
    try {
      _buildAndSavePDF();
    } finally {
      if (btn) { btn.disabled = false; btn.innerHTML = '↓ Download My Report'; }
    }
  }, 30);
}

function _buildAndSavePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const W = 612, H = 792;

  // ── Palette (matches UI exactly) ──────────────────────────────────
  const CREAM      = [250, 250, 247];
  const WHITE      = [255, 255, 255];
  const CHARCOAL   = [28,  28,  30 ];
  const GOLD       = [184, 134, 11 ];
  const GOLD_LIGHT = [254, 249, 231];
  const BORDER     = [232, 229, 220];
  const GRAY       = [107, 114, 128];
  const GRAY_LIGHT = [75,  85,  99 ];
  const GREEN_C    = [21,  128, 61 ];
  const YELLOW_C   = [180, 83,  9  ];
  const RED_C      = [185, 28,  28 ];

  const { overallPct, overallColor, catResults, top3Opps, hoursRange, displayBiz, today } = lastResults;

  // ── Helpers ────────────────────────────────────────────────────────
  function setColor(rgb) { doc.setTextColor(...rgb); }
  function setFill(rgb)  { doc.setFillColor(...rgb); }
  function setDraw(rgb)  { doc.setDrawColor(...rgb); }

  function colorFor(c) {
    if (c === 'green')  return GREEN_C;
    if (c === 'yellow') return YELLOW_C;
    return RED_C;
  }
  function labelFor(c) {
    if (c === 'green')  return 'GREEN — Strong Foundation';
    if (c === 'yellow') return 'YELLOW — Room to Grow';
    return 'RED — High Opportunity';
  }
  function tintFor(c) {
    // Very light version of each status color for card backgrounds
    if (c === 'green')  return [240, 253, 244];
    if (c === 'yellow') return [255, 251, 235];
    return [254, 242, 242];
  }

  function goldTopBar()    { setFill(GOLD); doc.rect(0, 0, W, 4, 'F'); }
  function goldBottomBar() { setFill(GOLD); doc.rect(0, H - 4, W, 4, 'F'); }

  function footer(pageNum, total) {
    setDraw(BORDER);
    doc.setLineWidth(0.5);
    doc.line(40, H - 40, W - 40, H - 40);
    setColor(GRAY);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setCharSpace(0.5);
    doc.text('TMS SOLUTIONS GROUP  ·  TIME & AUTOMATION DISCOVERY AUDIT  ·  CONFIDENTIAL', W / 2, H - 26, { align: 'center' });
    doc.setCharSpace(0);
    doc.text(`${pageNum} / ${total}`, W - 40, H - 26, { align: 'right' });
  }

  function newPage() {
    doc.addPage();
    setFill(WHITE);
    doc.rect(0, 0, W, H, 'F');
  }

  function borderLine(x1, y, x2) {
    setDraw(BORDER);
    doc.setLineWidth(0.5);
    doc.line(x1, y, x2, y);
  }
  function goldLine(x1, y, x2) {
    setDraw(GOLD);
    doc.setLineWidth(1);
    doc.line(x1, y, x2, y);
  }

  function tintedCard(x, y, w, h, statusColor) {
    const sc = colorFor(statusColor);
    doc.setFillColor(
      255 - (255 - sc[0]) * 0.07,
      255 - (255 - sc[1]) * 0.07,
      255 - (255 - sc[2]) * 0.07
    );
    doc.rect(x, y, w, h, 'F');
    setDraw(sc);
    doc.setLineWidth(1);
    doc.rect(x, y, w, h);
    // Left accent bar
    doc.setFillColor(...sc);
    doc.rect(x, y, 4, h, 'F');
  }

  const sc = colorFor(overallColor);
  const TOTAL_PAGES = 3;

  // ════════════════════════════════════════════════════════════════════
  // PAGE 1 — COVER
  // ════════════════════════════════════════════════════════════════════
  setFill(WHITE);
  doc.rect(0, 0, W, H, 'F');

  // Cream header band
  setFill(CREAM);
  doc.rect(0, 0, W, 318, 'F');
  goldTopBar();

  // TMS logotype
  setColor(GOLD);
  doc.setFontSize(38);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(11);
  doc.text('TMS', W / 2, 118, { align: 'center' });
  doc.setCharSpace(0);

  setColor(GRAY);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setCharSpace(4);
  doc.text('SOLUTIONS GROUP', W / 2, 137, { align: 'center' });
  doc.setCharSpace(0);

  // Gold rule
  setFill(GOLD);
  doc.rect(W / 2 - 30, 149, 60, 1.5, 'F');

  // Report title
  setColor(CHARCOAL);
  doc.setFontSize(30);
  doc.setFont('helvetica', 'bold');
  doc.text('Time & Automation', W / 2, 194, { align: 'center' });
  doc.text('Discovery Audit', W / 2, 230, { align: 'center' });

  setColor(GOLD);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setCharSpace(2.5);
  doc.text('AUTOMATION READINESS REPORT', W / 2, 256, { align: 'center' });
  doc.setCharSpace(0);

  borderLine(56, 292, W - 56);

  // Business name + date
  if (displayBiz !== 'Your Business') {
    setColor(GOLD);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text(displayBiz, W / 2, 334, { align: 'center' });
    setColor(GRAY);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.text(today, W / 2, 354, { align: 'center' });
  } else {
    setColor(GRAY);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.text(today, W / 2, 334, { align: 'center' });
  }

  // Score card
  const cardY = 408, cardW = 240, cardH = 148;
  const cardX = W / 2 - cardW / 2;
  tintedCard(cardX, cardY, cardW, cardH, overallColor);

  setColor(sc);
  doc.setFontSize(54);
  doc.setFont('helvetica', 'bold');
  doc.text(`${overallPct}%`, W / 2, cardY + 75, { align: 'center' });

  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text(labelFor(overallColor).toUpperCase(), W / 2, cardY + 99, { align: 'center' });
  doc.setCharSpace(0);

  // Short verdict excerpt (2 lines max)
  setColor(GRAY_LIGHT);
  doc.setFontSize(8.5);
  doc.setFont('helvetica', 'normal');
  const vShort = doc.splitTextToSize(getVerdictText(overallColor, overallPct), 430);
  doc.text(vShort.slice(0, 2), W / 2, cardY + 122, { align: 'center' });

  goldBottomBar();
  footer(1, TOTAL_PAGES);

  // ════════════════════════════════════════════════════════════════════
  // PAGE 2 — RESULTS OVERVIEW
  // ════════════════════════════════════════════════════════════════════
  newPage();
  goldTopBar();

  // Eyebrow + rule
  setColor(GOLD);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(2.5);
  doc.text('RESULTS OVERVIEW', 56, 38);
  doc.setCharSpace(0);
  goldLine(56, 46, W - 56);

  // Overall score banner
  setColor(CHARCOAL);
  doc.setFontSize(17);
  doc.setFont('helvetica', 'bold');
  doc.text('Automation Readiness Score', 56, 74);

  // Tinted banner box
  doc.setFillColor(
    255 - (255 - sc[0]) * 0.07,
    255 - (255 - sc[1]) * 0.07,
    255 - (255 - sc[2]) * 0.07
  );
  doc.rect(56, 84, 500, 78, 'F');
  setDraw(sc);
  doc.setLineWidth(1);
  doc.rect(56, 84, 500, 78);
  doc.setFillColor(...sc);
  doc.rect(56, 84, 4, 78, 'F');

  // Big score
  setColor(sc);
  doc.setFontSize(40);
  doc.setFont('helvetica', 'bold');
  doc.text(`${overallPct}%`, 106, 136);

  // Label + verdict
  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.text(labelFor(overallColor), 210, 112);

  setColor(GRAY_LIGHT);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  const vLines = doc.splitTextToSize(getVerdictText(overallColor, overallPct), 296);
  doc.text(vLines.slice(0, 3), 210, 128);

  // Hours lost callout
  let ty = 186;
  setColor(GOLD);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(2);
  doc.text('ESTIMATED TIME LOST TO MANUAL PROCESSES EACH WEEK', 56, ty);
  doc.setCharSpace(0);
  ty += 8;

  setFill(GOLD_LIGHT);
  setDraw(GOLD);
  doc.setLineWidth(0.75);
  doc.rect(56, ty, 500, 38, 'F');
  doc.rect(56, ty, 500, 38);
  doc.setFillColor(...GOLD);
  doc.rect(56, ty, 4, 38, 'F');

  setColor(CHARCOAL);
  doc.setFontSize(17);
  doc.setFont('helvetica', 'bold');
  doc.text(hoursRange, 74, ty + 24);

  ty += 54;

  // Category breakdown heading
  setColor(CHARCOAL);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Category Breakdown', 56, ty);
  ty += 8;
  borderLine(56, ty, W - 56);
  ty += 18;

  // Six category rows
  catResults.forEach((r, i) => {
    const rowColor = colorFor(r.color);

    // Alternating row tint
    if (i % 2 === 0) {
      setFill(CREAM);
      doc.rect(56, ty - 13, 500, 27, 'F');
    }
    // Left accent bar
    doc.setFillColor(...rowColor);
    doc.rect(56, ty - 13, 3, 27, 'F');

    // Category name
    setColor(CHARCOAL);
    doc.setFontSize(9.5);
    doc.setFont('helvetica', 'normal');
    doc.text(r.cat.name, 70, ty + 2);

    // Progress bar
    const barX = 258, barW = 180, barH = 6;
    setFill(BORDER);
    doc.rect(barX, ty - 2, barW, barH, 'F');
    doc.setFillColor(...rowColor);
    doc.rect(barX, ty - 2, barW * (r.pct / 100), barH, 'F');

    // Score %
    setColor(rowColor);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text(`${r.pct}%`, 452, ty + 2);

    // Status label
    doc.setFontSize(7.5);
    doc.setCharSpace(0.8);
    doc.text(r.color.toUpperCase(), 492, ty + 2);
    doc.setCharSpace(0);

    ty += 28;
  });

  goldBottomBar();
  footer(2, TOTAL_PAGES);

  // ════════════════════════════════════════════════════════════════════
  // PAGE 3 — TOP 3 OPPORTUNITIES + CTA
  // ════════════════════════════════════════════════════════════════════
  newPage();
  goldTopBar();

  setColor(GOLD);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(2.5);
  doc.text('YOUR TOP PRIORITIES', 56, 38);
  doc.setCharSpace(0);
  goldLine(56, 46, W - 56);

  setColor(CHARCOAL);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text('3 Highest-Impact Automation Opportunities', 56, 76);

  let oy = 100;

  top3Opps.forEach((opp, i) => {
    // Measure wrapped description to set card height dynamically
    doc.setFontSize(9.5);
    doc.setFont('helvetica', 'normal');
    const descLines = doc.splitTextToSize(opp.desc, 400);
    // Layout: top-pad 14 + category 12 + gap 4 + title 16 + gap 6 + desc(n×13) + gap 8 + impact 12 + bot-pad 14
    const cardHeight = 14 + 12 + 4 + 16 + 6 + (descLines.length * 13) + 8 + 12 + 14;

    // Card background + border + left accent bar
    const cardSc = colorFor(catResults.find(r => r.cat.shortName === opp.catName)?.color || 'yellow');
    const cardBg = i === 0 ? GOLD_LIGHT : WHITE;
    doc.setFillColor(...cardBg);
    setDraw(BORDER);
    doc.setLineWidth(0.5);
    doc.rect(56, oy, 500, cardHeight, 'FD');
    doc.setFillColor(...cardSc);
    doc.rect(56, oy, 4, cardHeight, 'F');

    // Rank circle (gold filled)
    setFill(GOLD);
    doc.circle(82, oy + 20, 11, 'F');
    setColor(WHITE);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text(`${opp.rank}`, 82, oy + 24, { align: 'center' });

    // Category label
    setColor(GRAY);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setCharSpace(1.5);
    doc.text(opp.catName.toUpperCase(), 104, oy + 16);
    doc.setCharSpace(0);

    // Opportunity title
    setColor(CHARCOAL);
    doc.setFontSize(12.5);
    doc.setFont('helvetica', 'bold');
    doc.text(opp.title, 104, oy + 32);

    // Description text
    setColor(GRAY_LIGHT);
    doc.setFontSize(9.5);
    doc.setFont('helvetica', 'normal');
    doc.text(descLines, 104, oy + 44);

    // Impact badge text
    setColor(GOLD);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setCharSpace(0.5);
    doc.text(`IMPACT: ${opp.impact.toUpperCase()}`, 104, oy + cardHeight - 12);
    doc.setCharSpace(0);

    oy += cardHeight + 12;
  });

  // Divider before CTA
  oy += 6;
  borderLine(56, oy, W - 56);
  oy += 18;

  // CTA headline
  setColor(GOLD);
  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  const ctaHeadLines = doc.splitTextToSize(
    "Based on your results, here\u2019s where TMS Solutions can help you first.",
    500
  );
  doc.text(ctaHeadLines, 56, oy);
  oy += ctaHeadLines.length * 16 + 6;

  // CTA body
  setColor(GRAY_LIGHT);
  doc.setFontSize(9.5);
  doc.setFont('helvetica', 'normal');
  const ctaBodyLines = doc.splitTextToSize(
    "Your audit reveals clear, high-value opportunities to reclaim time and strengthen your customer experience. Let\u2019s map out a plan specific to your business \u2014 no generic templates, no pressure.",
    500
  );
  doc.text(ctaBodyLines, 56, oy);
  oy += ctaBodyLines.length * 13 + 14;

  // Contact line
  setColor(GOLD);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.text('hello@tmssolutionsgroup.com  \u00B7  tmssolutionsgroup.com', 56, oy);

  goldBottomBar();
  footer(3, TOTAL_PAGES);

  // Save
  const safeBiz = displayBiz !== 'Your Business'
    ? displayBiz.replace(/[^a-z0-9\s]/gi, '').trim().replace(/\s+/g, '-')
    : '';
  const filename = safeBiz
    ? `TMS-Automation-Audit-${safeBiz}.pdf`
    : 'TMS-Automation-Audit-Report.pdf';

  doc.save(filename);
}

function restartAudit() {
  currentCat = 0;
  answers = {};
  bizName = '';
  lastResults = null;
  renderLanding();
  window.scrollTo(0, 0);
}

// =====================================================================
// INIT
// =====================================================================
renderLanding();
</script>
</body>
</html>
